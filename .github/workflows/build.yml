name: Build Keep Secret VIP APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Actions
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    - name: Cache Buildozer and Gradle
      uses: actions/cache@v4
      with:
        path: |
          ~/.buildozer
          ~/.gradle
        key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}

    - name: Install System Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          ccache git zip unzip \
          openjdk-17-jdk \
          autoconf automake libtool pkg-config \
          libffi-dev libssl-dev \
          libsdl2-dev libsdl2-image-dev \
          libsdl2-ttf-dev libsdl2-mixer-dev \
          zlib1g-dev

    - name: Install Buildozer and Cython
      run: |
        python -m pip install --upgrade pip
        python -m pip install setuptools==68.0.0 buildozer==1.5.0 cython==0.29.36

    - name: Clean Previous Broken Build
      run: |
        rm -rf .buildozer

    - name: Build Android APK with Buildozer
      run: |
        buildozer -v android debug
        
